<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Oyun Bitti</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            text-align: center;
            margin-top: 150px;
        }

        h1 {
            font-size: 40px;
        }

        .score {
            font-size: 25px;
            margin: 20px;
        }

        a {
            display: inline-block;
            padding: 15px 25px;
            background: white;
            color: #ff4b2b;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            background: #eee;
        }
    </style>
</head>

<body>

    <h1>Yanlışş</h1>

    <div class="score">Skorun: {{ score }}</div>

    <a href="/">Tekrar Oyna</a>

</body>
</html>
