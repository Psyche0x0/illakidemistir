<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İlla Ki Demiştir</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e13c2, #000000);
            color: white;
            text-align: center;
            margin: 100px;
            margin-bottom: 518px;
            padding: 0;
        }

        .container {
            margin-top: 100px;
            
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            color: #333;
            padding: 30px;
            margin: 20px auto;
            width: 60%;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            font-size: 20px;
        }

        .buttons {
            margin-top: 20px;
        }

        button {
            padding: 15px 25px;
            font-size: 16px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn1 {
            background-color: #4CAF50;
            color: white;
        }

        .btn1:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }

        .btn2 {
            background-color: #2196F3;
            color: white;
        }

        .btn2:hover {
            background-color: #1e88e5;
            transform: scale(1.05);
        }

        .result {
            font-size: 22px;
            margin-top: 20px;
        }

        .score {
            margin-top: 20px;
            font-size: 18px;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            color: white;
            text-decoration: underline;
        }

        a:hover {
            color: #ddd;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Emre bunu demiş midir?</h1>
    <div>Aşağıdaki sözü söyleyen kişi ya Emre ya da TCK 106. madde uyarınca hakaretten suçlu bulundu </div>

    <div class="card">
        {{ text }}
    </div>

    <form action="/guess" method="post" class="buttons">
        <button class="btn1" name="guess" value="1">İlla ki demiştir</button>
        <button class="btn2" name="guess" value="2">Yok yok dememiştir</button>
    </form>

    {% if result %}
        <div class="result">{{ result }}</div>
    {% endif %}

    <div class="score">Puan: {{ score }}</div>



</div>
<div></div>
</body>
</html>
